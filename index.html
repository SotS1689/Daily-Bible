<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Learning Habit Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 h-screen max-h-screen overflow-hidden font-sans select-none p-4 flex flex-col">

    <header class="flex flex-col sm:flex-row sm:items-center sm:justify-between border-b border-slate-800 pb-3 mb-4 gap-3 shrink-0">
        <div>
            <h1 class="text-2xl font-bold tracking-tight">Daily Dose of Greek, Hebrew, & Latin</h1>
            <p class="text-slate-400 text-xs mt-0.5">Stay Fresh</p>
        </div>
        
        <div class="flex items-center gap-3 shrink-0 sm:ml-auto">
            
            <a href="https://buymeacoffee.com/reformedretrieval" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1.5 px-2.5 py-1.5 bg-slate-800 hover:bg-slate-700 text-xs font-medium rounded-lg border border-slate-700 transition shadow-md text-slate-300 hover:text-slate-100 shrink-0">
                <svg class="w-3.5 h-3.5 text-indigo-400 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2 21h18a1 1 0 0 1 0 2H2a1 1 0 0 1 0-2zM20.242 11.022a1 1 0 0 0-.242-.688 2.99 2.99 0 0 0-2-.734H16V6a3 3 0 0 0-3-3H5a3 3 0 0 0-3 3v10a3 3 0 0 0 3 3h8a3 3 0 0 0 3-3v-2.022h2a3 3 0 0 0 3-3V11.02a1 1 0 0 0-.758-.998zM14 16a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h8a1 1 0 0 1 1 1v10zm4-4.022V11.6h-2v-2h2a1 1 0 0 1 1 1v1.378a1 1 0 0 1-1 1z"/>
                </svg>
                <span>Support</span>
            </a>

            <div class="bg-slate-800 border border-slate-700 rounded-xl p-3 min-w-[220px] shadow-md flex items-center gap-4">
                <div>
                    <div class="text-[10px] text-slate-400 uppercase tracking-wider font-semibold">Monthly Performance</div>
                    <div class="flex items-baseline gap-1.5 mt-0.5">
                        <span id="perf-percentage" class="text-2xl font-extrabold text-indigo-400">0%</span>
                        <span id="perf-meta" class="text-[10px] text-slate-500">0 of 0 days</span>
                    </div>
                </div>
                <div class="flex-1 bg-slate-700 h-2 rounded-full overflow-hidden min-w-[60px]">
                    <div id="perf-bar" class="bg-indigo-500 h-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

        </div>
    </header>

    <div class="flex items-center justify-between mb-3 shrink-0">
        <h2 class="text-lg font-semibold text-slate-200">Today's Lessons</h2>
        
        <div class="flex items-center gap-5">
            <div class="flex items-center gap-4 border-r border-slate-800 pr-4">
                <label class="inline-flex items-center cursor-pointer gap-2 select-none text-xs font-medium text-slate-300">
                    <span>Latin</span>
                    <div class="relative">
                        <input type="checkbox" id="latin-toggle" class="sr-only peer">
                        <div class="w-8 h-4 bg-slate-700 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-indigo-500"></div>
                    </div>
                </label>

                <label class="inline-flex items-center cursor-pointer gap-2 select-none text-xs font-medium text-slate-300">
                    <span>Septuagint</span>
                    <div class="relative">
                        <input type="checkbox" id="septuagint-toggle" class="sr-only peer">
                        <div class="w-8 h-4 bg-slate-700 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-indigo-500"></div>
                    </div>
                </label>
            </div>

            <button id="refresh-btn" class="px-2.5 py-1.5 bg-slate-800 hover:bg-slate-700 text-xs font-medium rounded-lg border border-slate-700 transition cursor-pointer">
                Refresh Feed
            </button>
        </div>
    </div>

    <main id="workspace" class="flex-1 min-h-0 w-full flex flex-col">
        <div id="video-feed" class="w-full h-full min-h-0 flex items-center justify-center">
            <p class="text-slate-500 text-sm italic animate-pulse">Loading latest videos...</p>
        </div>
    </main>

    <script>
        // --- CHANNELS CONFIGURATION ---
        const CHANNELS = [
            { name: "Daily Dose of Greek", id: "UCRSbS2XhqOhnSUzWfGHUkLg" },
            { name: "Daily Dose of Hebrew", id: "UC0fRqEfY1ZaiWiJWTj7HQng" },
            { name: "Daily Dose of Latin", id: "UCMldVrQ8rKkWyevvQonijoA" },
            { name: "Daily Dose of Septuagint", id: "UC5SB4egyj9-RNdjL-VxcDRw" }
        ];

        const STORAGE_KEY_WATCHED = "yt_tracker_watched_videos";
        const STORAGE_KEY_HISTORY = "yt_tracker_daily_history";
        const STORAGE_KEY_LATIN = "yt_tracker_show_latin";
        const STORAGE_KEY_SEPTUAGINT = "yt_tracker_show_septuagint";

        let watchedVideos = JSON.parse(localStorage.getItem(STORAGE_KEY_WATCHED)) || [];
        let dailyHistory = JSON.parse(localStorage.getItem(STORAGE_KEY_HISTORY)) || {}; 
        
        // Settings default to true (ON) if preference configurations are empty
        let showLatin = localStorage.getItem(STORAGE_KEY_LATIN) !== "false";
        let showSeptuagint = localStorage.getItem(STORAGE_KEY_SEPTUAGINT) !== "false";
        
        let currentVideos = [];
        let activeVideoId = null;

        const videoFeed = document.getElementById("video-feed");
        const perfPercentage = document.getElementById("perf-percentage");
        const perfBar = document.getElementById("perf-bar");
        const perfMeta = document.getElementById("perf-meta");
        const refreshBtn = document.getElementById("refresh-btn");
        const latinToggle = document.getElementById("latin-toggle");
        const septuagintToggle = document.getElementById("septuagint-toggle");

        // Sync initial UI toggle element states
        latinToggle.checked = showLatin;
        septuagintToggle.checked = showSeptuagint;

        async function fetchFeed() {
            videoFeed.className = "w-full h-full flex items-center justify-center";
            videoFeed.innerHTML = '<p class="text-slate-400 text-sm italic animate-pulse">Fetching latest channel updates...</p>';
            
            const fetchPromises = CHANNELS.map(async (channel) => {
                try {
                    const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${channel.id}`;
                    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(rssUrl)}`;
                    
                    const response = await fetch(proxyUrl);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    
                    const text = await response.text();
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(text, "text/xml");
                    
                    const firstEntry = xmlDoc.querySelector("entry");
                    if (firstEntry) {
                        const videoId = firstEntry.querySelector("videoId")?.textContent;
                        const title = firstEntry.querySelector("title")?.textContent;
                        
                        return {
                            channelName: channel.name,
                            videoId: videoId,
                            title: title,
                            error: false
                        };
                    }
                    throw new Error("No entries found in RSS feed");
                } catch (error) {
                    console.error(`Failed to fetch channel: ${channel.name}`, error);
                    return { channelName: channel.name, error: true };
                }
            });

            const results = await Promise.all(fetchPromises);
            window.cachedResults = results;
            currentVideos = results.filter(item => !item.error);
            
            renderFeed(results);
            checkAndLogDailyCompletion();
        }

        function renderFeed(allResults) {
            videoFeed.innerHTML = "";
            
            // Core Conditional Layout Filtering Pipeline
            const filteredResults = allResults.filter(item => {
                if (item.channelName === "Daily Dose of Latin" && !showLatin) return false;
                if (item.channelName === "Daily Dose of Septuagint" && !showSeptuagint) return false;
                return true;
            });

            const hasActiveVideo = activeVideoId && filteredResults.some(item => !item.error && item.videoId === activeVideoId);
            
            if (!hasActiveVideo) {
                // STATE 1: Standard Horizontal Adaptive Grid Layout
                let gridColsClass = 'md:grid-cols-4';
                if (filteredResults.length === 3) gridColsClass = 'md:grid-cols-3';
                if (filteredResults.length === 2) gridColsClass = 'md:grid-cols-2';
                
                videoFeed.className = `grid gap-4 w-full h-full min-h-0 items-stretch ${gridColsClass}`;
                
                filteredResults.forEach(item => {
                    videoFeed.appendChild(createCardElement(item, false, false));
                });
            } else {
                // STATE 2: Expanded Theater Split Layout
                videoFeed.className = "flex flex-col lg:flex-row gap-4 w-full h-full min-h-0 items-stretch";
                
                const mainStage = document.createElement("div");
                mainStage.className = "w-full lg:w-3/4 h-full flex flex-col min-h-0";
                
                const sidebar = document.createElement("div");
                sidebar.className = "w-full lg:w-1/4 h-full flex flex-col gap-3 min-h-0";
                
                filteredResults.forEach(item => {
                    if (!item.error && item.videoId === activeVideoId) {
                        mainStage.appendChild(createCardElement(item, true, false));
                    } else {
                        sidebar.appendChild(createCardElement(item, false, true));
                    }
                });
                
                videoFeed.appendChild(mainStage);
                videoFeed.appendChild(sidebar);
            }
        }

        function createCardElement(item, isActive, isSidebar) {
            const card = document.createElement("div");
            
            if (item.error) {
                card.className = `p-3 border border-red-900/40 bg-red-950/10 rounded-xl flex flex-col justify-center items-center shadow-sm h-full w-full ${isSidebar ? 'flex-1 min-h-0' : ''}`;
                card.innerHTML = `<span class="text-[10px] font-bold uppercase text-red-400">${item.channelName}</span><p class="text-xs text-slate-400 mt-1">Failed to load</p>';
                return card;
            }

            const isWatched = watchedVideos.includes(item.videoId);
            
            card.className = `p-3 border rounded-xl flex flex-col justify-between transition shadow-md w-full min-h-0 ${
                isActive ? 'bg-slate-800 border-indigo-500 ring-1 ring-indigo-500/20 h-full' : 
                isSidebar ? 'bg-slate-800/90 border-slate-700 hover:border-slate-600 flex-1' :
                isWatched ? 'bg-slate-900/40 border-slate-800 opacity-40 h-full' : 'bg-slate-800 border-slate-700 hover:border-slate-600 h-full'
            }`;

            const embedSrc = isActive ? `https://www.youtube.com/embed/${item.videoId}?autoplay=1` : `https://www.youtube.com/embed/${item.videoId}`;

            card.innerHTML = `
                <div class="w-full flex flex-col flex-1 min-h-0">
                    <div class="flex items-center justify-between gap-2 shrink-0">
                        <span class="text-[10px] font-bold tracking-wider uppercase text-indigo-400 block">${item.channelName}</span>
                        ${isActive ? `
                            <button onclick="minimizeVideo(event)" class="text-slate-400 hover:text-slate-200 p-1 rounded hover:bg-slate-700/50 transition cursor-pointer" title="Exit Theater">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 9V4.5M9 9H4.5M9 9L3 3m12 6V4.5M15 9h4.5M15 9l6-6M9 15v4.5M9 15H4.5M9 15l-6 6m12-5.5V20.5M15 15h4.5M15 15l6 6"/></svg>
                            </button>
                        ` : ''}
                    </div>
                    <h3 class="font-medium text-xs text-slate-100 line-clamp-1 mt-0.5 mb-2 shrink-0" title="${item.title}">
                        ${item.title}
                    </h3>
                    
                    <div class="relative flex-1 w-full bg-black shadow-inner rounded-lg overflow-hidden min-h-0 group">
                        <iframe 
                            class="w-full h-full absolute inset-0"
                            src="${embedSrc}" 
                            title="${item.title}" 
                            frameborder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture;" 
                            allowfullscreen>
                        </iframe>
                        
                        ${!isActive ? `
                            <div onclick="maximizeVideo('${item.videoId}')" class="absolute inset-0 bg-slate-950/20 hover:bg-slate-950/0 transition-all duration-150 cursor-pointer flex items-center justify-center z-10">
                                <div class="bg-indigo-600/90 text-white p-2.5 rounded-full scale-90 opacity-0 group-hover:opacity-100 group-hover:scale-100 transition-all duration-150 shadow-xl">
                                    <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                                </div>
                            </div>
                        ` : ''}
                    </div>
                </div>
                <div class="flex items-center justify-between mt-2 pt-2 border-t border-slate-700/50 w-full shrink-0">
                    <span class="text-[11px] ${isWatched ? 'text-emerald-400 font-medium' : 'text-slate-400'}">
                        ${isWatched ? '✓ Done' : 'Unfinished'}
                    </span>
                    <button onclick="toggleWatchStatus('${item.videoId}', event)" class="text-[11px] px-2.5 py-1 rounded font-medium cursor-pointer transition shrink-0 ${
                        isWatched ? 'bg-slate-700 hover:bg-slate-600 text-slate-300' : 'bg-indigo-600 hover:bg-indigo-500 text-white'
                    }">
                        ${isWatched ? 'Reset' : 'Mark Done'}
                    </button>
                </div>
            `;
            return card;
        }

        window.maximizeVideo = function(id) {
            activeVideoId = id;
            renderFeed(window.cachedResults);
        };

        window.minimizeVideo = function(event) {
            if(event) event.stopPropagation();
            activeVideoId = null;
            renderFeed(window.cachedResults);
        };

        window.toggleWatchStatus = function(id, event) {
            if(event) event.stopPropagation();
            
            if (watchedVideos.includes(id)) {
                watchedVideos = watchedVideos.filter(vId => vId !== id);
            } else {
                watchedVideos.push(id);
                if (activeVideoId === id) activeVideoId = null;
            }
            localStorage.setItem(STORAGE_KEY_WATCHED, JSON.stringify(watchedVideos));
            
            renderFeed(window.cachedResults);
            checkAndLogDailyCompletion();
        };

        // --- LATIN TOGGLE ACTION ---
        latinToggle.addEventListener("change", (e) => {
            showLatin = e.target.checked;
            localStorage.setItem(STORAGE_KEY_LATIN, showLatin);
            handleToggleSafetyGuard("Daily Dose of Latin", showLatin);
        });

        // --- SEPTUAGINT TOGGLE ACTION ---
        septuagintToggle.addEventListener("change", (e) => {
            showSeptuagint = e.target.checked;
            localStorage.setItem(STORAGE_KEY_SEPTUAGINT, showSeptuagint);
            handleToggleSafetyGuard("Daily Dose of Septuagint", showSeptuagint);
        });

        function handleToggleSafetyGuard(channelName, isVisible) {
            if (!isVisible && window.cachedResults) {
                const targetedItem = window.cachedResults.find(i => i.channelName === channelName);
                if (targetedItem && activeVideoId === targetedItem.videoId) {
                    activeVideoId = null;
                }
            }
            if (window.cachedResults) {
                renderFeed(window.cachedResults);
                checkAndLogDailyCompletion();
            }
        }

        // --- DYNAMICALLY ADAPTING COMPLETION TRACKING ---
        function checkAndLogDailyCompletion() {
            const today = new Date().toISOString().split('T')[0];
            if (currentVideos.length === 0) return;

            const activeTargetVideos = currentVideos.filter(v => {
                if (v.channelName === "Daily Dose of Latin" && !showLatin) return false;
                if (v.channelName === "Daily Dose of Septuagint" && !showSeptuagint) return false;
                return true;
            });

            if (activeTargetVideos.length === 0) return;

            const allDoneToday = activeTargetVideos.every(video => watchedVideos.includes(video.videoId));
            if (allDoneToday) {
                dailyHistory[today] = true;
            } else {
                delete dailyHistory[today];
            }
            
            localStorage.setItem(STORAGE_KEY_HISTORY, JSON.stringify(dailyHistory));
            calculatePerformance();
        }

        function calculatePerformance() {
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth();
            const currentDay = now.getDate();

            let completedDaysThisMonth = 0;
            for (let d = 1; d <= currentDay; d++) {
                const dateString = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                if (dailyHistory[dateString] === true) {
                    completedDaysThisMonth++;
                }
            }

            const percentage = Math.round((completedDaysThisMonth / currentDay) * 100) || 0;
            perfPercentage.textContent = `${percentage}%`;
            perfBar.style.width = `${percentage}%`;
            perfMeta.textContent = `${completedDaysThisMonth} of ${currentDay} days`;
        }

        refreshBtn.addEventListener("click", fetchFeed);
        fetchFeed();
    </script>
</body>
</html>
